name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck

      - run: pip install ruff mypy
      - run: cd apps/api && ruff check .
      - run: cd apps/api && mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tayari
          POSTGRES_PASSWORD: tayari_dev
          POSTGRES_DB: tayari
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tayari"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -e "apps/api[dev]"

      - name: Run API tests
        run: cd apps/api && pytest
        env:
          DATABASE_URL: postgresql+asyncpg://tayari:tayari_dev@localhost:5432/tayari
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
