name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: |
          pip install "ruff>=0.5.0" "mypy>=1.10.0"
          pip install "fastapi[standard]>=0.115.0" "uvicorn[standard]>=0.30.0" \
            "sqlalchemy[asyncio]>=2.0.30" "asyncpg>=0.29.0" \
            "pydantic>=2.7.0" "pydantic-settings>=2.3.0" \
            "python-jose[cryptography]>=3.3.0" "passlib[bcrypt]>=1.7.4" \
            "python-multipart>=0.0.9" "httpx>=0.27.0" "openai>=1.30.0" \
            "stripe>=9.0.0" "apscheduler>=3.10.0" "sentry-sdk>=2.5.0" \
            "boto3>=1.34.0" "resend>=0.8.0"

      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tayari
          POSTGRES_PASSWORD: tayari_dev
          POSTGRES_DB: tayari
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tayari"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: |
          cd apps/api
          pip install "fastapi[standard]>=0.115.0" "uvicorn[standard]>=0.30.0" \
            "sqlalchemy[asyncio]>=2.0.30" "asyncpg>=0.29.0" \
            "pydantic>=2.7.0" "pydantic-settings>=2.3.0" \
            "python-jose[cryptography]>=3.3.0" "passlib[bcrypt]>=1.7.4" \
            "python-multipart>=0.0.9" "httpx>=0.27.0" "openai>=1.30.0" \
            "stripe>=9.0.0" "apscheduler>=3.10.0" "sentry-sdk>=2.5.0" \
            "boto3>=1.34.0" "resend>=0.8.0"
          pip install "pytest>=8.0.0" "pytest-asyncio>=0.24.0"

      - name: Run API tests
        run: cd apps/api && python -m pytest
        env:
          DATABASE_URL: postgresql+asyncpg://tayari:tayari_dev@localhost:5432/tayari
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
