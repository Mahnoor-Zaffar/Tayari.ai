name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "architecture/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "architecture/**"
      - "*.md"

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_CACHE_DIR: .turbo

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
            node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: uv sync --directory apps/api

      - run: pnpm lint
      - run: pnpm typecheck

  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
            node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Run JS/TS tests
        run: pnpm --filter @tayari/web test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tayari
          POSTGRES_PASSWORD: tayari_dev
          POSTGRES_DB: tayari
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tayari"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml
      - name: Install Python deps
        run: uv sync --directory apps/api
      - name: Run API tests
        run: uv run --directory apps/api python -m pytest
        env:
          DATABASE_URL: postgresql+asyncpg://tayari:tayari_dev@localhost:5432/tayari
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
            node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check performance budget
        run: node apps/web/scripts/performance-budget.mjs

  deploy:
    name: Deploy
    needs: [lint-and-typecheck, js-tests, python-tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Deploy placeholder
        run: |
          echo "Configure your deployment target here:"
          echo "  - Render:         https://render.com/docs/deploy-fastapi"
          echo "  - Railway:        https://railway.app/"
          echo "  - Fly.io:         https://fly.io/docs/"
          echo "  - Docker Compose: docker compose -f infrastructure/docker-compose.yml up -d"
