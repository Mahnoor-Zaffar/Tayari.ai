name: Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "infrastructure/**"
      - "Dockerfile*"

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Build API image
        run: docker build -f apps/api/Dockerfile.dev -t tayari-api .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile.dev -t tayari-web .
